services:
  nginx:
    container_name: nginx-proxy
    image: nginxproxy/nginx-proxy:1.6
    networks:
      - "frontend-tier"
    ports:
      - "80:80"
      - "443:443"
    restart: always
    environment:
      DOCKER_HOST: tcp://localhost:2375
    volumes:
      - "/tmp/.ik/docker-plugin/volumes/vhosts.d:/etc/nginx/vhost.d:ro"
      - "/tmp/.ik/docker-plugin/volumes/tls:/etc/nginx/certs:ro"
    logging:
      options:
        max-size: "100M"
        max-file: "4"

  proxy-companion:
    container_name: proxy-companion
    image: sebastienheyd/self-signed-proxy-companion
    environment:
      NGINX_PROXY_CONTAINER: nginx-proxy
      DOCKER_HOST: tcp://localhost:2375
    networks:
      - "frontend-tier"
    restart: always
    volumes:
      - "/tmp/.ik/docker-plugin/volumes/tls:/etc/nginx/certs:rw"

networks:
  frontend-tier:
    name: proxy

