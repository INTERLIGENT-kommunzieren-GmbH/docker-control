name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.2.3)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release branch, set VERSION and tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git checkout -b "release/$VERSION"
          sed -i "s/^VERSION=.*/VERSION=\"$VERSION\"/" plugin/docker-control
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -am "Release v$VERSION"
          git tag "$VERSION"
          git push origin "release/$VERSION" --tags

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.event.inputs.version }}"^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)")
          fi
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
