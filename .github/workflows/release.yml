name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (z.B. 1.2.3)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release branch and set VERSION
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git checkout -b "release/$VERSION"
          sed -i "s/^VERSION=.*/VERSION=\"$VERSION\"/" plugin/docker-control
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -am "Release v$VERSION"

      - name: Push branch and tag using PAT
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git tag "$VERSION"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }} "release/$VERSION"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }} "refs/tags/$VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^$VERSION$" | head -n 1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.version, 'rc') || contains(github.event.inputs.version, 'beta') || contains(github.event.inputs.version, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
