name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version für manuellen Start (optional)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"   # Tag-Name direkt aus dem Event
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          file: ./Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/interligent-kommunzieren-gmbh/docker-plugin:${{ steps.version.outputs.version }}
            ghcr.io/interligent-kommunzieren-gmbh/docker-plugin:latest
