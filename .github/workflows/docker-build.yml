name: Build and Push Docker Image

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(grep '^VERSION=' plugin/docker-control | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          file: ./Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/interligent-kommunzieren-gmbh/docker-plugin:${{ steps.version.outputs.version }}
            ghcr.io/interligent-kommunzieren-gmbh/docker-plugin:latest
